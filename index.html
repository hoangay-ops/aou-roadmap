// ─── TSV parser ──────────────────────────────────────────────────────────────
function parseTSV(tsv) {
  var lines = tsv.trim().split("\n");
  var hdrs  = lines[0].split("\t").map(function(h){ return h.trim(); });
  return lines.slice(1).filter(function(l){ return l.trim(); }).map(function(l){
    var cells = l.split("\t");
    var o = {};
    hdrs.forEach(function(h,i){ o[h] = (cells[i]||"").trim(); });
    return o;
  });
}

function nf() {
  for (var i=0;i<arguments.length;i++){var x=arguments[i];if(x!=null&&String(x).trim()!=="")return String(x).trim();}
  return "";
}
function hasFullDates(item){ return Boolean(item&&item.start&&item.end); }
function isTBDItem(item){ return Boolean(item&&!hasFullDates(item)&&!item.quarter); }
function resolveGoal(r){var s=String(r||"").trim();return GOALS[s]?s:(GOAL_NUM_MAP[s]||"");}
function extractParentId(p){if(!p)return "";var t=String(p).split(" ")[0].trim();return /^\d+(\.\d+)*$/.test(t)?t:"";}
function goalOrder(g){return GOALS[g]?Number(GOALS[g].num):99;}

function fmtDate(s) {
  if (!s) return "";
  var d = new Date(s);
  if (isNaN(d)) return s;
  return d.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});
}
// [FIX] Full date+time formatter for footer
function fmtDateTime(d) {
  if (!d) return "";
  return d.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}) + " at " + d.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"});
}

  for(;;){var s=new Date(y,m,1);if(s>ve)break;var qStr="Q"+(Math.floor(m/3)+1)+" "+y;a.push({label:MONTHS[m]+" "+y,start:s,end:new Date(y,m+1,0),q:qStr});if(++m>11){m=0;y++;}}
  return a;
}
function genQuarters(vs,ve){
  var a=[],y=vs.getFullYear(),q=Math.floor(vs.getMonth()/3);
  for(;;){var s=new Date(y,q*3,1);if(s>ve)break;var qStr="Q"+(q+1)+" "+y;a.push({label:qStr,start:s,end:new Date(y,q*3+3,0),q:qStr});if(++q>3){q=0;y++;}}
  return a;
}
function monthOpts(){
  var a=[];
  for(var y=2025;y<=2029;y++)for(var m=0;m<12;m++)a.push({label:MONTHS[m]+" "+y,value:y+"-"+String(m+1).padStart(2,"0")});
  return a;
}
const MONTH_OPTS = monthOpts();
function findQuarterCol(q,cols){if(!q)return null;return cols.find(function(c){return c.q===q.trim();})||null;}
function spreadMs(ms,pctFn){
  var pos=ms.map(function(m){return Object.assign({},m,{pv:pctFn(m.start)});}).filter(function(m){return m.pv!==null;});
  pos.sort(function(a,b){return a.pv-b.pv;});
  var res=[];
  for(var i=0;i<pos.length;i++){
    var yo=0;
    for(var j=0;j<res.length;j++){if(Math.abs(pos[i].pv-res[j].pv)<2){yo=res[j].yo===0?-8:res[j].yo===-8?8:res[j].yo+8;}}
    res.push(Object.assign({},pos[i],{yo:yo}));
  }
  return res;
}

function parseCSV(text){
  var rows=[],row=[],cell="",inQ=false;
  for(var i=0;i<text.length;i++){
    var c=text[i],n=text[i+1];
    if(c==='"'&&inQ&&n==='"'){cell+='"';i++;}
    else if(c==='"')inQ=!inQ;
    else if(c===','&&!inQ){row.push(cell);cell="";}
    else if((c==='\n'||c==='\r')&&!inQ){if(cell||row.length){row.push(cell);rows.push(row);row=[];cell="";}if(c==='\r'&&n==='\n')i++;}
    else cell+=c;
  }
  if(cell||row.length){row.push(cell);rows.push(row);}
  var hdrs=rows.shift().map(function(h){return h.trim();});
  return rows.filter(function(r){return r.some(function(c){return c.trim()!=="";});}).map(function(r){var o={};hdrs.forEach(function(h,i){o[h]=(r[i]||"").trim();});return o;});
}

function normalizeRows(rows){
  var inits=[],mils=[];
  for(var i=0;i<rows.length;i++){
    var r=rows[i];
    if(String(r.showOnRoadmap||"").toUpperCase()==="FALSE")continue;
    if(String(r.type||"").trim()==="Exclude from Roadmap")continue;
    var id=nf(r.id),cat=nf(r.cat).toLowerCase(),icon=nf(r.icon).toLowerCase(),name=nf(r.name);
    if(!name)continue;
    if(id&&cat==="initiative"){
      var goal=resolveGoal(nf(r.goal)),rawType=nf(r.type);
      if(rawType==="Program Staff"||rawType==="Participant Milestone")continue;
      if(!goal||!rawType||TYPE_KEYS.indexOf(rawType)===-1)continue;
      var rawStatus = nf(r.status)||nf(r["Status"])||"";
      var status = STATUS_CFG[rawStatus] ? rawStatus : null;
      inits.push({
        id,name,
        start:nf(r.start)||null,end:nf(r.end)||null,
        goal,type:rawType,cat:"initiative",
        overviewUrl:nf(r.overviewUrl),
        quarter:nf(r.quarter)||null,
        status,
        notes:nf(r.notes)||null,
        description:nf(r.description,r.summary)||null,
      });
    } else if(!id&&(icon==="star"||icon==="diamond")){
      var pid=extractParentId(nf(r.parent));
      if(!pid)continue;
      var mc2=(cat==="tech"||cat==="comms")?cat:(icon==="star"?"tech":"comms");
      mils.push({id:("MS-"+pid+"-"+name).replace(/[^a-zA-Z0-9._-]+/g,"-").slice(0,80),name,start:nf(r.start)||null,end:nf(r.end)||null,cat:mc2,icon,parent:pid,goal:"",type:""});
    }
  }
  var imap={};inits.forEach(function(it){imap[it.id]=it;});
  var resolvedMs=mils.map(function(m){
    var p=imap[m.parent];if(!p)return null;
    return Object.assign({},m,{goal:p.goal,type:p.type,start:m.start||m.end||p.end||p.start||null});
  }).filter(function(m){return m&&m.start;});
  return inits.concat(resolvedMs);
}

function addCacheBuster(url){return url+(url.indexOf("?")===-1?"?":"&")+"_="+Date.now()+"-"+Math.random().toString(36).slice(2);}
function sheetUrlCandidates(){
  var params=new URLSearchParams(window.location.search||"");
  var customCsv=params.get("csvUrl");
  if(customCsv)return[{label:"custom CSV",url:addCacheBuster(customCsv),baseUrl:customCsv}];
  var sheetId=params.get("sheetId")||LIVE_SHEET_ID,gid=params.get("gid")||LIVE_SHEET_GID;
  var id=encodeURIComponent(sheetId),g=encodeURIComponent(gid);
  return[
    {label:"live export CSV",url:addCacheBuster("https://docs.google.com/spreadsheets/d/"+id+"/export?format=csv&gid="+g+"&single=true"),baseUrl:"https://docs.google.com/spreadsheets/d/"+id+"/export?format=csv&gid="+g+"&single=true"},
    {label:"live gviz CSV",url:addCacheBuster("https://docs.google.com/spreadsheets/d/"+id+"/gviz/tq?tqx=out:csv&gid="+g),baseUrl:"https://docs.google.com/spreadsheets/d/"+id+"/gviz/tq?tqx=out:csv&gid="+g},
  ];
}
function liveCsvUrl(){var p=new URLSearchParams(window.location.search||"");var c=p.get("csvUrl");if(c)return c;var s=p.get("sheetId")||LIVE_SHEET_ID,g=p.get("gid")||LIVE_SHEET_GID;return"https://docs.google.com/spreadsheets/d/"+encodeURIComponent(s)+"/gviz/tq?tqx=out:csv&gid="+encodeURIComponent(g);}
function liveSheetEditUrl(){var p=new URLSearchParams(window.location.search||"");var s=p.get("sheetId")||LIVE_SHEET_ID,g=p.get("gid")||LIVE_SHEET_GID;return"https://docs.google.com/spreadsheets/d/"+encodeURIComponent(s)+"/edit?gid="+encodeURIComponent(g)+"#gid="+encodeURIComponent(g);}
function gvizJsonUrl(){var p=new URLSearchParams(window.location.search||"");var s=p.get("sheetId")||LIVE_SHEET_ID,g=p.get("gid")||LIVE_SHEET_GID;var cb="__roadmapGvizCallback_"+Date.now()+"_"+Math.random().toString(36).slice(2);var url="https://docs.google.com/spreadsheets/d/"+encodeURIComponent(s)+"/gviz/tq?gid="+encodeURIComponent(g)+"&tqx=out:json;responseHandler:"+cb;return{callbackName:cb,url:addCacheBuster(url),baseUrl:url};}
function gvizCellValue(cell){if(!cell)return "";if(cell.f!=null&&String(cell.f).trim()!=="")return String(cell.f).trim();if(cell.v==null)return "";if(Object.prototype.toString.call(cell.v)==="[object Date]"){var d=cell.v;return(d.getMonth()+1)+"/"+d.getDate()+"/"+String(d.getFullYear()).slice(-2);}return String(cell.v).trim();}
function parseGvizTable(resp){if(!resp||!resp.table||!resp.table.cols||!resp.table.rows)throw new Error("Google returned no table data.");var headers=resp.table.cols.map(function(c){return String(c.label||c.id||"").trim();});if(!headers.filter(Boolean).length)throw new Error("Google returned table data without headers.");return resp.table.rows.map(function(row){var o={};headers.forEach(function(h,i){if(h)o[h]=gvizCellValue((row.c||[])[i]);});return o;}).filter(function(r){return Object.keys(r).some(function(k){return String(r[k]||"").trim()!=="";});});}
function fetchGvizJsonpSource(){var src=gvizJsonUrl();return new Promise(function(resolve,reject){var timer=null,script=document.createElement("script");function cleanup(){if(timer)clearTimeout(timer);try{delete window[src.callbackName];}catch(e){window[src.callbackName]=undefined;}if(script&&script.parentNode)script.parentNode.removeChild(script);}window[src.callbackName]=function(resp){try{var parsedRows=parseGvizTable(resp),rows=normalizeRows(parsedRows);if(!rows.filter(function(i){return i.cat==="initiative";}).length)throw new Error("live gviz JSON returned data, but no roadmap initiatives were found.");cleanup();resolve({rows,source:"live gviz JSON",rawCount:parsedRows.length,sourceUrl:src.baseUrl});}catch(err){cleanup();reject(err);}};script.onerror=function(){cleanup();reject(new Error("live gviz JSON could not be loaded."));};timer=setTimeout(function(){cleanup();reject(new Error("live gviz JSON timed out."));},12000);script.src=src.url;document.head.appendChild(script);});}
function fetchOneSheetSource(src){return fetch(src.url,{cache:"no-store",credentials:"omit"}).then(function(resp){if(!resp.ok)throw new Error(src.label+" returned HTTP "+resp.status);return resp.text();}).then(function(text){if(String(text||"").toLowerCase().indexOf("<html")>-1||String(text||"").toLowerCase().indexOf("<!doctype")>-1)throw new Error(src.label+" returned HTML instead of CSV.");var parsedRows=parseCSV(text),rows=normalizeRows(parsedRows);if(!rows.filter(function(i){return i.cat==="initiative";}).length)throw new Error(src.label+" returned CSV but no roadmap initiatives found.");return{rows,source:src.label,rawCount:parsedRows.length,sourceUrl:src.baseUrl||src.url};});}
function fetchRoadmapData(){var sources=sheetUrlCandidates(),errors=[];function tryCsv(i){if(i>=sources.length)throw new Error(errors.join(" | ")||"No sheet sources available.");return fetchOneSheetSource(sources[i]).catch(function(err){errors.push(err.message||String(err));return tryCsv(i+1);});}return fetchGvizJsonpSource().catch(function(err){errors.push(err.message||String(err));return tryCsv(0);});}

function MultiSelect({label,options,selected,onChange,getKey,getLabel,getColor,disabled}){
  var [open,setOpen]=useState(false),ref=useRef(null);
  useEffect(function(){function h(e){if(ref.current&&!ref.current.contains(e.target))setOpen(false);}document.addEventListener("mousedown",h);return function(){document.removeEventListener("mousedown",h);};},[]);
  var all=selected.length===0;
  function toggle(k){onChange(selected.includes(k)?selected.filter(x=>x!==k):selected.concat([k]));}
  return(
    <div ref={ref} style={{position:"relative",display:"inline-block",opacity:disabled?.5:1,pointerEvents:disabled?"none":"auto"}}>
      <button onClick={()=>setOpen(o=>!o)} style={{fontSize:10.5,padding:"4px 10px",border:"1px solid "+(open||!all?"#2471A3":"#e0e0e0"),borderRadius:20,background:open||!all?"#D6EAF8":"#fafafa",color:open||!all?"#2471A3":"#666",cursor:"pointer",display:"flex",alignItems:"center",gap:5,whiteSpace:"nowrap"}}>

          <div onClick={()=>{onChange([]);setOpen(false);}} style={{fontSize:11.5,padding:"6px 12px",cursor:"pointer",color:all?"#2471A3":"#555",fontWeight:all?600:400,background:all?"#EBF5FB":"transparent",display:"flex",alignItems:"center",gap:8}}><CB on={all}/>All</div>
          <div style={{height:1,background:"#f0f0f0",margin:"4px 0"}}/>
          {options.map(function(o){var k=getKey(o),on=selected.includes(k),c=getColor?getColor(o):null;return(
            <div key={k} onClick={()=>toggle(k)} style={{fontSize:11.5,padding:"6px 12px",cursor:"pointer",display:"flex",alignItems:"center",gap:8,background:on?"#EBF5FB":"transparent",color:on?"#2471A3":"#333"}}>
              <CB on={on}/>{c&&<span style={{width:8,height:8,borderRadius:2,background:c,display:"inline-block"}}/>}{getLabel(o)}
            </div>
          );})}

function App(){

  var [grouped,setGrouped]       = useState(true);
  var [showAud,setShowAud]       = useState(true);
  var [showLeg,setShowLeg]       = useState(true);
  var [hideTBD,setHideTBD]       = useState(false);
  var [milestoneView,setMilestoneView] = useState("both");
  var [sortBy,setSortBy]         = useState("start");
  var [search,setSearch]         = useState("");
  var [fGoals,setFGoals]         = useState([]);
  var [fTypes,setFTypes]         = useState([]);
  var [fStatus,setFStatus]       = useState([]);
  var [expanded,setExpanded]     = useState(null);
  var [tooltip,setTooltip]       = useState(null);
  var [shareMsg,setShareMsg]     = useState(false);
  var [dataLoadedAt,setDataLoadedAt] = useState(null);
  var [dataSource,setDataSource] = useState("");
  var [rawRowCount,setRawRowCount] = useState(null);
  var [sourceUrl,setSourceUrl]   = useState("");
  var [loadError,setLoadError]   = useState("");
  var [isRefreshing,setIsRefreshing] = useState(false);

  var urlParams = useMemo(()=>new URLSearchParams(window.location.search||""),[]);

  useEffect(function(){

    if (p.get("from"))    setStartM(p.get("from"));
    if (p.get("to"))      setEndM(p.get("to"));

  function loadEmbeddedFallback(errMsg){
    var r=normalizeRows(parseTSV(FALLBACK_TSV));
    setItems(r);setDataLoadedAt(new Date());setDataSource("embedded fallback");

    setLoadError(errMsg||"Live Sheet data could not be loaded; showing embedded fallback data.");
    setLoadSt("ready");
  }
  function loadRoadmap(useFallbackOnFail){
    setLoadError("");setIsRefreshing(true);
    fetchRoadmapData().then(function(result){
      setItems(result.rows);setDataLoadedAt(new Date());setDataSource(result.source);
      setRawRowCount(result.rawCount);setSourceUrl(result.sourceUrl||"");setLoadSt("ready");
    }).catch(function(err){
      var msg=err.message||String(err);
      if(useFallbackOnFail){loadEmbeddedFallback(msg);}
      else{setLoadError(msg);setDataSource("live load failed");setLoadSt(items.length?"ready":"error");}
    }).finally(function(){setIsRefreshing(false);});
  }
  useEffect(function(){loadRoadmap(true);},[]);

  var VS=useMemo(function(){var p=startM.split("-");return new Date(+p[0],+p[1]-1,1);},[startM]);
  var VE=useMemo(function(){var p=endM.split("-");return new Date(+p[0],+p[1],0);},[endM]);
  var pct=useCallback(function(d){if(!d)return null;var D=new Date(d),t=VE-VS;return Math.max(0,Math.min(100,((D-VS)/t)*100));},[VS,VE]);
  var cols=useMemo(function(){return unit==="month"?genMonths(VS,VE):genQuarters(VS,VE);},[VS,VE,unit]);

  var allInit=useMemo(function(){return items.filter(i=>i.cat==="initiative");},[items]);
  var msItems=useMemo(function(){return items.filter(i=>i.cat==="comms"||i.cat==="tech");},[items]);

  // [FIX] KPI counts — now live from data, with hasAnyStatus flag to control card state
  var kpi=useMemo(function(){
    var total=allInit.length;
    var counts={};
    STATUS_KEYS.forEach(k=>{counts[k]=0;});
    var withStatus=0;
    allInit.forEach(function(i){if(i.status&&counts[i.status]!==undefined){counts[i.status]++;withStatus++;}});
    return {total,counts,hasAnyStatus:withStatus>0};
  },[allInit]);

  var filtered=useMemo(function(){
    var d=allInit.filter(function(r){
      if(fGoals.length&&!fGoals.includes(r.goal))return false;
      if(fTypes.length&&!fTypes.includes(r.type))return false;
      if(fStatus.length&&!fStatus.includes(r.status||""))return false;
      if(hideTBD&&isTBDItem(r))return false;
      if(search){var q=search.toLowerCase();if(!r.name.toLowerCase().includes(q)&&!r.id.toLowerCase().includes(q))return false;}
      return true;
    });
    d.sort(function(a,b){
      if(sortBy==="start")return (a.start||"9999")>(b.start||"9999")?1:-1;
      if(sortBy==="end")return (a.end||"9999")>(b.end||"9999")?1:-1;
      if(sortBy==="name")return a.name.localeCompare(b.name);
      return a.id.localeCompare(b.id);
    });
    return d;
  },[allInit,fGoals,fTypes,fStatus,hideTBD,search,sortBy]);

  var getMs=useCallback(function(id){
    return msItems.filter(function(m){
      if(m.parent!==id)return false;
      if(milestoneView!=="both"&&m.cat!==milestoneView)return false;
      return true;
    });
  },[msItems,milestoneView]);

  var groups=useMemo(function(){
    if(!grouped)return[["All",filtered]];
    var key=groupBy==="goal"?"goal":"type",g={};
    filtered.forEach(function(r){var k=r[key]||"Unknown";if(!g[k])g[k]=[];g[k].push(r);});
    return Object.entries(g).sort(function(a,b){return groupBy==="goal"?goalOrder(a[0])-goalOrder(b[0]):TYPE_KEYS.indexOf(a[0])-TYPE_KEYS.indexOf(b[0]);});
  },[filtered,grouped,groupBy]);

  function gc(k){return GOALS[k]?GOALS[k].color:TYPE_COLOR[k]||"#888";}
  function gl(k){return GOALS[k]?"Goal "+GOALS[k].num+": "+GOALS[k].short:k;}
  function ou(id){var it=items.find(i=>i.id===id);return it&&it.overviewUrl?it.overviewUrl:"https://sites.google.com/nih.gov/aou-project-status-inventory/psi-home/initiatives/"+id.replace(/\./g,"-");}

  var todayP=pct(TODAY);
  var expItem=expanded?items.find(i=>i.id===expanded):null;
  var expMs=expanded?getMs(expanded):[];

  function reset(){
    setStartM("2026-01");setEndM("2026-12");setUnit("quarter");setGroupBy("goal");
    setSortBy("start");setGrouped(true);setShowAud(true);setShowLeg(true);
    setHideTBD(false);setMilestoneView("both");setSearch("");
    setFGoals([]);setFTypes([]);setFStatus([]);setExpanded(null);
  }

  // [FIX] Full-state share URL builder
  function shareView(){
    var p = new URLSearchParams();
    p.set("view","share");
    p.set("from",startM);
    p.set("to",endM);
    p.set("unit",unit);
    p.set("group",groupBy);
    p.set("grouped",grouped?"1":"0");
    p.set("sort",sortBy);
    p.set("aud",showAud?"1":"0");
    p.set("leg",showLeg?"1":"0");
    p.set("hideTbd",hideTBD?"1":"0");
    p.set("ms",milestoneView);
    if(fGoals.length)p.set("goals",fGoals.map(g=>GOALS[g].num).join(","));
    if(fTypes.length)p.set("types",fTypes.join(","));
    if(fStatus.length)p.set("status",fStatus.join("|"));
    if(search)p.set("q",search);
    navigator.clipboard.writeText(location.href.split("?")[0]+"?"+p).then(()=>{setShareMsg(true);setTimeout(()=>setShareMsg(false),2500);});
  }
  // [FIX] Locked executive share — same as above but adds locked=1
  function shareLockedView(){
    var p = new URLSearchParams();
    p.set("view","share");
    p.set("locked","1");
    p.set("from",startM);
    p.set("to",endM);
    p.set("unit",unit);
    p.set("group",groupBy);
    p.set("grouped",grouped?"1":"0");
    p.set("sort",sortBy);
    p.set("aud",showAud?"1":"0");
    p.set("leg",showLeg?"1":"0");
    p.set("hideTbd",hideTBD?"1":"0");
    p.set("ms",milestoneView);
    if(fGoals.length)p.set("goals",fGoals.map(g=>GOALS[g].num).join(","));
    if(fTypes.length)p.set("types",fTypes.join(","));
    if(fStatus.length)p.set("status",fStatus.join("|"));
    if(search)p.set("q",search);
    navigator.clipboard.writeText(location.href.split("?")[0]+"?"+p).then(()=>{setShareMsg(true);setTimeout(()=>setShareMsg(false),2500);});
  }

  if(loadSt==="loading")return(
    <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:12,color:"#999"}}>
      <div style={{width:32,height:32,border:"3px solid #eee",borderTopColor:"#2471A3",borderRadius:"50%",animation:"spin .8s linear infinite"}}/>
      <div style={{fontSize:13}}>Loading roadmap data…</div>
    </div>
  );
  if(loadSt==="error")return(
    <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:10,color:"#555",padding:40,textAlign:"center"}}>
      <div style={{fontSize:28}}>⚠️</div>
      <div style={{fontSize:15,fontWeight:600}}>Could not load live Sheet data</div>
      <div style={{fontSize:12,color:"#999",maxWidth:400}}>The live CSV could not be read by the dashboard. Confirm the sheet is shared for anonymous viewing, then retry.</div>
      <button onClick={()=>{setLoadSt("loading");loadRoadmap(true);}} style={{marginTop:8,padding:"8px 20px",border:"1px solid #2471A3",borderRadius:6,background:"#fff",color:"#2471A3",cursor:"pointer",fontSize:12}}>Retry</button>
    </div>
  );

  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%",background:"#fff",color:"#333"}}>

      {/* Tooltip */}
      {tooltip&&(
        <div style={{position:"fixed",left:tooltip.x+14,top:tooltip.y-14,background:"#1a1a1a",borderRadius:7,padding:"9px 13px",fontSize:11.5,zIndex:400,pointerEvents:"none",maxWidth:280,boxShadow:"0 4px 20px rgba(0,0,0,.28)"}}>
          <div style={{fontWeight:600,color:"#fff",marginBottom:3,lineHeight:1.4}}>{tooltip.name}</div>
          <div style={{color:"#aaa",fontSize:10.5,marginBottom:tooltip.cat?4:0}}>{tooltip.date}</div>
          {tooltip.cat&&<div style={{display:"flex",alignItems:"center",gap:5}}><MsIcon icon={tooltip.cat==="tech"?"star":"diamond"} sz={11} col={MC}/><span style={{fontSize:10,color:"#ccc"}}>{tooltip.cat==="tech"?"Launch milestone":"Key milestone"}</span></div>}
        </div>
      )}

      {/* Header */}
      <div style={{padding:"10px 24px",borderBottom:"1px solid #ebebeb",display:"flex",alignItems:"center",justifyContent:"space-between",gap:12,flexShrink:0}}>
        <div>
          <div style={{fontSize:9,textTransform:"uppercase",letterSpacing:1.2,color:"#bbb",marginBottom:2}}>NIH · <em>All of Us</em> Research Program</div>
          <div style={{fontSize:15,fontWeight:700,letterSpacing:"-.02em",color:"#111"}}><em>All of Us</em> 2026 Program Roadmap</div>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <span style={{fontSize:11,padding:"3px 10px",borderRadius:12,background:"#f0f0f0",color:"#999"}}>{TODAY.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})}</span>
          {/* [FIX] Locked view badge replaces controls */}
          {isLocked ? (
            <span style={{fontSize:10,padding:"4px 12px",borderRadius:12,background:"#D5F5E3",color:"#1E8449",fontWeight:600}}>Read-only view</span>
          ) : (<>
            <button onClick={shareView} style={{fontSize:11,padding:"4px 12px",border:"1px solid #ddd",borderRadius:6,background:"#fff",color:"#555",cursor:"pointer"}}>Share view</button>
            <button onClick={shareLockedView} title="Copy a read-only link (toolbars hidden)" style={{fontSize:11,padding:"4px 12px",border:"1px solid #ddd",borderRadius:6,background:"#fff",color:"#555",cursor:"pointer"}}>Share locked</button>
            <button onClick={reset} style={{fontSize:11,padding:"4px 12px",border:"1px solid #ddd",borderRadius:6,background:"#fff",color:"#999",cursor:"pointer"}}>Reset</button>
          </>)}
        </div>
      </div>
      {shareMsg&&<div style={{padding:"4px 24px",background:"#D5F5E3",color:"#1E8449",fontSize:11,flexShrink:0}}>View link copied to clipboard</div>}

      {/* [FIX] KPI Summary Strip — now live when status data exists, placeholder only when zero initiatives have status */}
      <div style={{padding:"8px 24px",borderBottom:"1px solid #ebebeb",display:"flex",gap:12,alignItems:"center",background:"#fafafa",flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:5,padding:"5px 12px",borderRadius:8,border:"1px solid #e8e8e8",background:"#fff"}}>
          <span style={{fontSize:22,fontWeight:700,color:"#111",lineHeight:1}}>{kpi.total}</span>
          <span style={{fontSize:10.5,color:"#999",lineHeight:1.3}}>total<br/>initiatives</span>
        </div>

        <div style={{width:1,height:32,background:"#e8e8e8",flexShrink:0}}/>

        {/* [STATUS TRACKING] Visible only when ENABLE_STATUS_TRACKING=true */}
        {ENABLE_STATUS_TRACKING && STATUS_KEYS.map(function(sk){
          var cfg=STATUS_CFG[sk];
          var count=kpi.counts[sk];
          var hasData=kpi.hasAnyStatus;
          var isActive=fStatus.includes(sk);
          return(
            <div key={sk}
              className={hasData&&!isLocked?"kpi-card-active":""}
              onClick={hasData&&!isLocked?function(){setFStatus(isActive?fStatus.filter(s=>s!==sk):[sk]);}:undefined}
              title={hasData?(isActive?"Click to clear filter":"Click to filter by "+sk):"Populate the 'status' column in the sheet to enable"}
              style={{display:"flex",alignItems:"center",gap:6,padding:"5px 12px",
                border:isActive?"2px solid "+cfg.dot:(hasData?"1px solid #e0e0e0":"1px dashed #e0e0e0"),
                borderRadius:8,background:isActive?cfg.bg:(hasData?"#fff":"#fafafa"),
                opacity:hasData?1:.55,userSelect:"none",cursor:hasData&&!isLocked?"pointer":"default"}}>
              <span style={{width:8,height:8,borderRadius:"50%",background:cfg.dot,flexShrink:0}}/>
              <span style={{fontSize:16,fontWeight:700,color:hasData?"#111":"#ccc",lineHeight:1}}>{hasData?count:"—"}</span>
              <span style={{fontSize:10.5,color:hasData?"#666":"#aaa",whiteSpace:"nowrap"}}>{cfg.label}</span>
            </div>
          );
        })}

        <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:6}}>
          <span style={{fontSize:10,color:"#ccc"}}>Showing</span>
          <span style={{fontSize:13,fontWeight:600,color:"#333"}}>{filtered.length}</span>
          <span style={{fontSize:10,color:"#ccc"}}>of {kpi.total}</span>
        </div>
      </div>

      {/* [FIX] Toolbars hidden in locked mode */}
      {!isLocked && <>
      {/* Tier 1: Date range, view, group, sort */}
      <div style={{padding:"8px 24px",borderBottom:"1px solid #f0f0f0",display:"flex",gap:14,alignItems:"center",flexWrap:"wrap",flexShrink:0,background:"#fafafa"}}>
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          <span style={{fontSize:9.5,textTransform:"uppercase",letterSpacing:.8,color:"#bbb",fontWeight:600}}>Range</span>
          <select style={{fontSize:11,padding:"4px 7px",border:"1px solid #e0e0e0",borderRadius:6,background:"#fff",color:"#444",outline:"none",cursor:"pointer"}} value={startM} onChange={e=>setStartM(e.target.value)}>
            {MONTH_OPTS.map(o=><option key={o.value} value={o.value}>{o.label}</option>)}
          </select>
          <span style={{color:"#ccc",fontSize:11}}>→</span>
          <select style={{fontSize:11,padding:"4px 7px",border:"1px solid #e0e0e0",borderRadius:6,background:"#fff",color:"#444",outline:"none",cursor:"pointer"}} value={endM} onChange={e=>setEndM(e.target.value)}>
            {MONTH_OPTS.map(o=><option key={o.value} value={o.value}>{o.label}</option>)}
          </select>
        </div>
        <Sep/>
        <div style={{display:"flex",alignItems:"center",gap:4}}>
          <span style={{fontSize:9.5,textTransform:"uppercase",letterSpacing:.8,color:"#bbb",fontWeight:600,marginRight:2}}>View</span>
          <SegBtn active={unit==="quarter"} onClick={()=>setUnit("quarter")}>Quarter</SegBtn>
          <SegBtn active={unit==="month"} onClick={()=>setUnit("month")}>Month</SegBtn>
        </div>
        <Sep/>
        <div style={{display:"flex",alignItems:"center",gap:4}}>
          <span style={{fontSize:9.5,textTransform:"uppercase",letterSpacing:.8,color:"#bbb",fontWeight:600,marginRight:2}}>Group</span>
          <SegBtn active={groupBy==="goal"} onClick={()=>setGroupBy("goal")}>Goal</SegBtn>
          <SegBtn active={groupBy==="type"} onClick={()=>setGroupBy("type")}>Audience</SegBtn>
        </div>
        <Sep/>
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          <span style={{fontSize:9.5,textTransform:"uppercase",letterSpacing:.8,color:"#bbb",fontWeight:600}}>Sort</span>
          <select style={{fontSize:11,padding:"4px 7px",border:"1px solid #e0e0e0",borderRadius:6,background:"#fff",color:"#444",outline:"none",cursor:"pointer"}} value={sortBy} onChange={e=>setSortBy(e.target.value)}>
            <option value="start">Start date</option>
            <option value="end">End date</option>
            <option value="name">Name</option>
            <option value="id">ID</option>
          </select>
        </div>
        <div style={{marginLeft:"auto"}}>
          <input style={{fontSize:11.5,padding:"5px 10px",border:"1px solid #e0e0e0",borderRadius:20,width:160,outline:"none",background:"#fff"}} placeholder="🔍  Search…" value={search} onChange={e=>setSearch(e.target.value)}/>
        </div>
      </div>

      {/* Tier 2: Filters and toggles */}
      <div style={{padding:"6px 24px",borderBottom:"1px solid #ebebeb",display:"flex",gap:10,alignItems:"center",flexWrap:"wrap",flexShrink:0,background:"#fafafa"}}>
        <span style={{fontSize:9.5,textTransform:"uppercase",letterSpacing:.8,color:"#bbb",fontWeight:600}}>Filter</span>
        <MultiSelect label="Goal" options={GOAL_KEYS} selected={fGoals} onChange={setFGoals} getKey={k=>k} getLabel={k=>"G"+GOALS[k].num+": "+GOALS[k].short} getColor={k=>GOALS[k].color}/>
        {showAud&&<MultiSelect label="Audience" options={TYPE_KEYS} selected={fTypes} onChange={setFTypes} getKey={k=>k} getLabel={k=>k} getColor={k=>TYPE_COLOR[k]}/>}
        {/* [FIX] Status filter — new MultiSelect in the toolbar */}
        <MultiSelect label="Status" options={STATUS_KEYS} selected={fStatus} onChange={setFStatus} getKey={k=>k} getLabel={k=>k} getColor={k=>STATUS_CFG[k].dot}/>
        <Sep/>
        <span style={{fontSize:9.5,textTransform:"uppercase",letterSpacing:.8,color:"#bbb",fontWeight:600}}>Milestones</span>
        <SegBtn active={milestoneView==="both"} onClick={()=>setMilestoneView("both")}>Both</SegBtn>
        <SegBtn active={milestoneView==="tech"} onClick={()=>setMilestoneView("tech")}>★ Launch</SegBtn>
        <SegBtn active={milestoneView==="comms"} onClick={()=>setMilestoneView("comms")}>◇ Key</SegBtn>
        <Sep/>
        <Tog on={showAud} onClick={()=>setShowAud(v=>!v)}>Audience</Tog>
        <Tog on={showLeg} onClick={()=>setShowLeg(v=>!v)}>Legend</Tog>
        <Tog on={hideTBD} onClick={()=>setHideTBD(v=>!v)}>Hide TBD</Tog>
      </div>
      </>}

      {/* Legend */}
      {showLeg&&(
        <div style={{padding:"5px 24px",borderBottom:"1px solid #ebebeb",display:"flex",gap:16,alignItems:"center",flexWrap:"wrap",fontSize:10.5,color:"#888",flexShrink:0}}>
          <div style={{display:"flex",alignItems:"center",gap:7,flexWrap:"wrap"}}>
            <span style={{fontSize:9,textTransform:"uppercase",letterSpacing:.8,color:"#bbb",fontWeight:700}}>Goals</span>
            {Object.entries(GOALS).map(([k,g])=><span key={k} style={{display:"flex",alignItems:"center",gap:4}}><span style={{width:14,height:6,borderRadius:2,background:g.color,display:"inline-block"}}/>{g.short}</span>)}
          </div>
          {showAud&&<div style={{display:"flex",alignItems:"center",gap:7,flexWrap:"wrap"}}>
            <span style={{fontSize:9,textTransform:"uppercase",letterSpacing:.8,color:"#bbb",fontWeight:700}}>Audience</span>
            {TYPE_KEYS.map(t=><span key={t} style={{display:"flex",alignItems:"center",gap:3}}><span style={{fontSize:8,fontWeight:700,width:14,height:14,borderRadius:3,display:"inline-flex",alignItems:"center",justifyContent:"center",background:TYPE_BG[t]||"#eee",color:TYPE_COLOR[t]||"#666"}}>{TYPE_SHORT[t]}</span>{t}</span>)}
          </div>}
          <div style={{display:"flex",alignItems:"center",gap:7,flexWrap:"wrap"}}>
            <span style={{fontSize:9,textTransform:"uppercase",letterSpacing:.8,color:"#bbb",fontWeight:700}}>Markers</span>
            <span style={{display:"flex",alignItems:"center",gap:4}}><DiamondIcon sz={13}/>Key milestone</span>
            <span style={{display:"flex",alignItems:"center",gap:4}}><StarIcon sz={13}/>Launch milestone</span>
            <span style={{display:"flex",alignItems:"center",gap:4}}><span style={{width:22,height:6,borderRadius:2,background:"repeating-linear-gradient(90deg,#ccc 0,#ccc 3px,transparent 3px,transparent 6px)",display:"inline-block"}}/>TBD</span>
            <span style={{display:"flex",alignItems:"center",gap:3}}><span style={{width:1.5,height:12,background:"#C0392B",display:"inline-block"}}/>Today</span>
          </div>
          {/* [STATUS TRACKING] Visible only when ENABLE_STATUS_TRACKING=true */}
          {ENABLE_STATUS_TRACKING && <div style={{display:"flex",alignItems:"center",gap:7,flexWrap:"wrap"}}>
            <span style={{fontSize:9,textTransform:"uppercase",letterSpacing:.8,color:"#bbb",fontWeight:700}}>Status</span>
            {STATUS_KEYS.map(sk=>{var c=STATUS_CFG[sk];return <span key={sk} style={{display:"flex",alignItems:"center",gap:3}}><span style={{width:7,height:7,borderRadius:"50%",background:c.dot,display:"inline-block"}}/>{sk}</span>;})}
          </div>}
        </div>
      )}

      {/* Main body */}
      <div style={{flex:1,display:"flex",overflow:"hidden"}}>
        <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>

          {/* Frozen column header */}
          <div style={{display:"flex",flexShrink:0,borderBottom:"2px solid #e0e0e0",background:"#f7f7f7",zIndex:10}}>
            <div style={{width:LABEL_W,minWidth:LABEL_W,flexShrink:0,borderRight:"1px solid #e5e5e5",height:ROW_H,display:"flex",alignItems:"center",padding:"0 14px",fontSize:9.5,textTransform:"uppercase",letterSpacing:.8,color:"#bbb",fontWeight:600}}>Initiative</div>
            <div id="col-hdr" style={{flex:1,overflowX:"hidden",overflowY:"hidden"}}>
              <div style={{minWidth:Math.max(500,cols.length*80),display:"grid",gridTemplateColumns:"repeat("+cols.length+",1fr)",height:ROW_H}}>
                {cols.map(function(c,i){var now=TODAY>=c.start&&TODAY<=c.end;return(
                  <div key={i} style={{display:"flex",alignItems:"center",justifyContent:"center",fontSize:10.5,fontWeight:600,color:now?"#2471A3":"#aaa",background:now?"#EBF5FB":"transparent",borderRight:i<cols.length-1?"1px solid #e8e8e8":"none"}}>{c.label}</div>
                );})}
              </div>
            </div>
          </div>

          <div style={{flex:1,display:"flex",overflow:"hidden"}}>

            {/* [FIX] Label panel — overflowY changed to "auto" so sticky headers work */}
            <div id="lbl-panel" style={{width:LABEL_W,minWidth:LABEL_W,flexShrink:0,borderRight:"1px solid #e5e5e5",overflowY:"auto",overflowX:"hidden"}}>
              {groups.map(function([gKey,gItems]){return(
                <div key={gKey}>
                  {grouped&&(
                    <div style={{height:ROW_H,display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 14px",background:"#f5f5f5",borderBottom:"1px solid #ebebeb",borderLeft:"3px solid "+gc(gKey),position:"sticky",top:0,zIndex:5}}>
                      <span style={{fontSize:11,fontWeight:600,color:gc(gKey)}}>{gl(gKey)}</span>
                      <span style={{fontSize:10,color:"#ccc"}}>{gItems.length}</span>
                    </div>
                  )}
                  {gItems.map(function(item){return(
                    <div key={item.id} className="lbl-row" onClick={()=>setExpanded(expanded===item.id?null:item.id)}
                      style={{height:ROW_H,display:"flex",alignItems:"center",gap:4,padding:"0 6px 0 10px",borderBottom:"1px solid #f5f5f5",borderLeft:grouped?"3px solid "+gc(gKey)+"22":"none",overflow:"hidden",cursor:"pointer",background:expanded===item.id?"#EBF5FB":"transparent",transition:"background .1s"}}>
                      {/* [STATUS TRACKING] Visible only when ENABLE_STATUS_TRACKING=true */}
                      {ENABLE_STATUS_TRACKING && <StatusDot status={item.status}/>}
                      {showAud&&TYPE_SHORT[item.type]&&<span style={{fontSize:7.5,fontWeight:700,width:14,height:14,borderRadius:3,display:"inline-flex",alignItems:"center",justifyContent:"center",background:TYPE_BG[item.type]||"#eee",color:TYPE_COLOR[item.type]||"#666",flexShrink:0}}>{TYPE_SHORT[item.type]}</span>}
                      {isTBDItem(item)&&<span style={{fontSize:7,fontWeight:600,padding:"1px 3px",borderRadius:3,background:"#f0f0f0",color:"#ccc",flexShrink:0,border:"1px solid #e8e8e8"}}>TBD</span>}
                      <span style={{fontSize:11,color:"#333",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",flex:1,lineHeight:1}} title={item.name}>{item.name}</span>
                      <a href={ou(item.id)} target="_blank" rel="noopener noreferrer" onClick={e=>e.stopPropagation()} style={{flexShrink:0,opacity:.3,display:"flex"}} title="Open overview"><ExtLink/></a>
                      <span className="lbl-chevron" style={{fontSize:9,color:"#ccc",flexShrink:0,opacity:expanded===item.id?.5:0,transition:"opacity .1s"}}>›</span>
                    </div>
                  );})}
                </div>
              );})}
            </div>

            {/* Timeline */}
            <div id="timeline-body" style={{flex:1,overflow:"auto"}} onScroll={function(e){
              var el=e.currentTarget;
              var h=document.getElementById("col-hdr"),l=document.getElementById("lbl-panel");
              if(h)h.scrollLeft=el.scrollLeft;
              if(l)l.scrollTop=el.scrollTop;
            }}>
              <div style={{minWidth:Math.max(500,cols.length*80),position:"relative"}}>
                {groups.map(function([gKey,gItems]){return(
                  <div key={gKey}>
                    {grouped&&<div style={{height:ROW_H,background:"#f5f5f5",borderBottom:"1px solid #ebebeb",position:"relative",top:0,zIndex:5}}><GridLines n={cols.length}/></div>}
                    {gItems.map(function(item){
                      var l2=pct(item.start),r2=pct(item.end),w=(l2!==null&&r2!==null)?r2-l2:0;
                      var hasDates=hasFullDates(item),barCol=GOALS[item.goal]?GOALS[item.goal].color:"#888";
                      var ms=getMs(item.id),spread=spreadMs(ms,pct);
                      var qCol=(!hasDates&&item.quarter)?findQuarterCol(item.quarter,cols):null;
                      var qL=qCol?pct(qCol.start.toISOString().slice(0,10)):null;
                      var qR=qCol?pct(qCol.end.toISOString().slice(0,10)):null;
                      var qW=(qL!==null&&qR!==null)?qR-qL:0;

                      var statusStripe = item.status && STATUS_CFG[item.status] ? STATUS_CFG[item.status].dot : null;

                      return(
                        <div key={item.id} style={{height:ROW_H,position:"relative",borderBottom:"1px solid #f5f5f5",background:expanded===item.id?"#EBF5FB":"transparent",overflow:"visible"}}>
                          <GridLines n={cols.length} faint={true}/>

                          {/* [STATUS TRACKING] Bar with status stripe visible only when ENABLE_STATUS_TRACKING=true */}
                          {hasDates&&w>0.2&&(
                            <div onClick={()=>setExpanded(expanded===item.id?null:item.id)} title={item.name}
                              style={{position:"absolute",top:8,height:20,borderRadius:4,cursor:"pointer",left:l2+"%",width:w+"%",background:barCol,opacity:.92,display:"flex",alignItems:"center",overflow:"hidden",zIndex:2}}>
                              {ENABLE_STATUS_TRACKING && statusStripe&&<div style={{width:3,height:"100%",background:statusStripe,flexShrink:0,borderRadius:"4px 0 0 4px"}}/>}
                              {w>5&&<span style={{fontSize:9.5,fontWeight:500,padding:"0 5px",color:"#fff",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{item.name}</span>}
                            </div>
                          )}
                          {!hasDates&&qW>0.2&&(
                            <div onClick={()=>setExpanded(expanded===item.id?null:item.id)} title={"Target: "+item.quarter}
                              style={{position:"absolute",top:11,height:14,borderRadius:3,cursor:"pointer",left:qL+"%",width:qW+"%",background:barCol,opacity:.15,zIndex:2,border:"1.5px dashed "+barCol,display:"flex",alignItems:"center",justifyContent:"center"}}>
                              <span style={{fontSize:8,fontWeight:600,color:barCol,opacity:1}}>{item.quarter}</span>
                            </div>
                          )}
                          {/* [FIX] TBD bar — reduced height and opacity to be less visually noisy */}
                          {!hasDates&&!qW&&(
                            <div onClick={()=>setExpanded(expanded===item.id?null:item.id)} title="Dates TBD"
                              style={{position:"absolute",top:14,left:"4%",right:"4%",height:8,borderRadius:3,cursor:"pointer",zIndex:2,background:"repeating-linear-gradient(90deg,#e0e0e0 0,#e0e0e0 4px,transparent 4px,transparent 8px)",opacity:.35,display:"flex",alignItems:"center",justifyContent:"center"}}>
                              <span style={{fontSize:7,color:"#bbb",fontWeight:600,background:"rgba(255,255,255,.9)",padding:"0 3px",borderRadius:2}}>TBD</span>
                            </div>
                          )}

                          {spread.map(function(m){return(
                            <span key={m.id}
                              onMouseEnter={e=>setTooltip({x:e.clientX,y:e.clientY,name:m.name,date:fmtDate(m.start),cat:m.cat})}
                              onMouseLeave={()=>setTooltip(null)}
                              onClick={e=>e.stopPropagation()}
                              style={{position:"absolute",top:8+m.yo,left:m.pv+"%",transform:"translateX(-8px)",zIndex:10,cursor:"pointer",display:"inline-flex",filter:"drop-shadow(0 1px 2px rgba(0,0,0,.2))"}}>
                              <MsIcon icon={m.icon} sz={16} col={MC}/>
                            </span>
                          );})}
                        </div>
                      );
                    })}
                  </div>
                );})}

                {/* [FIX] Today line — slightly wider, with a subtle column tint */}
                {todayP!==null&&todayP>=0&&todayP<=100&&(
                  <>
                  <div style={{position:"absolute",top:0,bottom:0,left:"calc("+todayP+"% - 12px)",width:24,background:"rgba(192,57,43,.03)",zIndex:3,pointerEvents:"none"}}/>
                  <div style={{position:"absolute",top:0,bottom:0,left:todayP+"%",width:1.5,background:"#C0392B",opacity:.6,zIndex:5,pointerEvents:"none"}}>
                    <div style={{position:"absolute",top:4,left:3,fontSize:9,fontWeight:700,background:"#C0392B",color:"#fff",padding:"2px 6px",borderRadius:3,whiteSpace:"nowrap"}}>Today</div>
                  </div>
                  </>
                )}
              </div>
            </div>
          </div>
        </div>

        {/* [FIX] Detail panel — responsive width with clamp */}
        <div style={{width:expItem?"clamp(320px, 30vw, 420px)":"0px",minWidth:expItem?"320px":"0px",maxWidth:"38vw",borderLeft:expItem?"1px solid #e5e5e5":"none",background:"#fafafa",overflow:"hidden",transition:"width .2s,min-width .2s",flexShrink:0,display:"flex",flexDirection:"column"}}>
          {expItem&&<>
            <div style={{padding:"16px 18px 12px",borderBottom:"1px solid #ebebeb",background:"#fff",flexShrink:0}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8,marginBottom:8}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:14,fontWeight:700,lineHeight:1.35,overflowWrap:"anywhere",color:"#111",marginBottom:4}}>{expItem.name}</div>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <span style={{fontSize:10,color:"#ccc",fontFamily:"monospace"}}>{expItem.id}</span>
                    {/* [STATUS TRACKING] Visible only when ENABLE_STATUS_TRACKING=true */}
                    {ENABLE_STATUS_TRACKING && expItem.status&&<StatusBadge status={expItem.status}/>}
                  </div>
                </div>
                <button onClick={()=>setExpanded(null)} style={{border:"none",background:"none",fontSize:18,color:"#ccc",cursor:"pointer",lineHeight:1,padding:"0 4px",flexShrink:0}}>×</button>
              </div>
              <a href={ou(expItem.id)} target="_blank" rel="noopener noreferrer"
                style={{display:"inline-flex",alignItems:"center",gap:5,fontSize:11,color:"#2471A3",textDecoration:"none",padding:"5px 12px",border:"1px solid #C8DCF0",borderRadius:6,background:"#EBF5FB",fontWeight:500}}>
                View initiative overview <ExtLink/>
              </a>
            </div>

            <div style={{flex:1,overflowY:"auto",padding:"14px 18px"}}>
              {expItem.description&&<div style={{marginBottom:10,padding:"10px 12px",borderRadius:6,background:"#fff",border:"1px solid #ebebeb",fontSize:11.5,color:"#444",lineHeight:1.65,whiteSpace:"pre-wrap"}}><div style={{fontSize:9,textTransform:"uppercase",letterSpacing:.8,color:"#ccc",fontWeight:600,marginBottom:5}}>Description</div>{expItem.description}</div>}
              {expItem.notes&&<div style={{marginBottom:14,padding:"10px 12px",borderRadius:6,background:"#fff",border:"1px solid #ebebeb",fontSize:11.5,color:"#444",lineHeight:1.65,whiteSpace:"pre-wrap"}}><div style={{fontSize:9,textTransform:"uppercase",letterSpacing:.8,color:"#ccc",fontWeight:600,marginBottom:5}}>Notes</div>{expItem.notes}</div>}

              {[
                ["Goal",     GOALS[expItem.goal]?"Goal "+GOALS[expItem.goal].num+": "+GOALS[expItem.goal].short:expItem.goal],
                ["Audience", expItem.type],
                ...(ENABLE_STATUS_TRACKING?[["Status",   expItem.status||"Not set"]]:[] ),
                ["Timing",   hasFullDates(expItem)?null:(expItem.quarter?"Target "+expItem.quarter:"TBD")],
                ["Start",    hasFullDates(expItem)?fmtDate(expItem.start):null],
                ["End",      hasFullDates(expItem)?fmtDate(expItem.end):null],
                ["Duration", hasFullDates(expItem)?Math.round((new Date(expItem.end)-new Date(expItem.start))/86400000)+" days":null],
              ].filter(r=>r[1]).map(function([k,v]){
                var isStatus=k==="Status";
                return(
                  <div key={k} style={{display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:"1px solid #f2f2f2",padding:"7px 0",gap:12}}>
                    <span style={{fontSize:9.5,textTransform:"uppercase",letterSpacing:.8,color:"#ccc",fontWeight:600,flexShrink:0}}>{k}</span>
                    {isStatus&&expItem.status
                      ? <StatusBadge status={expItem.status}/>
                      : <span style={{fontSize:12,color:"#222",textAlign:"right",maxWidth:230,overflowWrap:"anywhere",lineHeight:1.4}}>{v}</span>
                    }
                  </div>
                );
              })}

              {!hasFullDates(expItem)&&(
                <div style={{padding:"8px 10px",borderRadius:5,background:"#FFFBF0",border:"1px solid #F0E0A0",fontSize:11,color:"#7D6000",display:"flex",gap:7,marginTop:6,lineHeight:1.5}}>
                  <span>📅</span><span>{expItem.quarter?"Target: "+expItem.quarter+". Confirm dates in the sheet.":"Dates not yet confirmed."}</span>
                </div>
              )}

              {expMs.length>0&&(
                <div style={{marginTop:14}}>
                  <div style={{fontSize:9,textTransform:"uppercase",letterSpacing:.8,color:"#ccc",fontWeight:600,marginBottom:7}}>Milestones ({expMs.length})</div>
                  {expMs.map(function(m){return(
                    <div key={m.id} style={{fontSize:11,display:"flex",alignItems:"center",gap:8,padding:"7px 10px",marginBottom:4,borderRadius:5,border:"1px solid "+MC+"33",background:MC+"08"}}>
                      <MsIcon icon={m.icon} sz={14} col={MC} style={{flexShrink:0}}/>
                      <span style={{flex:1,overflowWrap:"anywhere",lineHeight:1.4,color:"#333"}}>{m.name}</span>
                      <span style={{color:"#bbb",fontSize:10,flexShrink:0,whiteSpace:"nowrap"}}>{fmtDate(m.start)}</span>
                    </div>
                  );})}
                </div>
              )}
            </div>
          </>}
        </div>
      </div>

      {/* [FIX] Footer — full date+time, and offline badge */}
      <div style={{padding:"4px 24px",borderTop:"1px solid #ebebeb",background:"#fafafa",display:"flex",alignItems:"center",justifyContent:"space-between",gap:8,flexShrink:0,fontSize:11,color:"#888"}}>
        <span style={{fontSize:10,color:"#bbb"}}>
          {dataLoadedAt?"Data as of "+fmtDateTime(dataLoadedAt):""}{dataSource==="embedded fallback"?" (offline copy)":""}
        </span>
        {isAdmin&&(
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            {loadError&&<span title={loadError} style={{fontSize:10,color:"#A04000",maxWidth:400,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>⚠ {loadError}</span>}
            {dataSource&&<span style={{fontSize:10,padding:"2px 8px",borderRadius:10,background:dataSource==="embedded fallback"?"#FDECEA":"#EAF7EF",color:dataSource==="embedded fallback"?"#C0392B":"#1E8449"}}>{dataSource}</span>}
            <a href={liveCsvUrl()} target="_blank" rel="noopener noreferrer" style={{fontSize:11,padding:"3px 9px",border:"1px solid #ddd",borderRadius:6,background:"#fff",color:"#555",textDecoration:"none"}}>CSV</a>
            <a href={liveSheetEditUrl()} target="_blank" rel="noopener noreferrer" style={{fontSize:11,padding:"3px 9px",border:"1px solid #ddd",borderRadius:6,background:"#fff",color:"#555",textDecoration:"none"}}>Sheet</a>
            <button disabled={isRefreshing} onClick={()=>loadRoadmap(true)} style={{fontSize:11,padding:"3px 10px",border:"1px solid #C8DCF0",borderRadius:6,background:isRefreshing?"#f5f5f5":"#EBF5FB",color:isRefreshing?"#aaa":"#2471A3",cursor:isRefreshing?"default":"pointer"}}>{isRefreshing?"Refreshing…":"Refresh"}</button>
          </div>
        )}
      </div>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
